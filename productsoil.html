.buy-btn{

    border-radius:10px;

}

.buy-btn:hover{

}
.back-btn{
    display:inline-flex;
    align-items:center;

    cursor:pointer;

}

.back-btn:hover{

}

.back-btn:active{

} 
.container{

#cartMessage{
margin-top:15px;
color:#ff8c00;

}

    }

        text-align:center;
    }

    .product-image{
        min-width:auto;

    .product-image img{
        max-width:220px;

    .description{

    }

    .size-list{
        text-align:left;

    }

    .buy-btn{
        width:100%;
        padding:14px;
    }

    .back-btn{
        width:100%;
        justify-content:center;
    }

}
